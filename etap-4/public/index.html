<!DOCTYPE html>
<html>

<head>
    <title>Historia Stron - Etap 4 (Refactor)</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="calculator">
        <div class="calc-header">
            <h2>KALKULATOR v4.0</h2>
            <p>Etap 4: Divy + CSS + JS (SPA)</p>
        </div>
        <div class="display-container">
            <input type="text" id="display" value="0" readonly class="display-input">
        </div>
        <div class="keypad">
            <button type="button" class="calc-btn btn-num">7</button>
            <button type="button" class="calc-btn btn-num">8</button>
            <button type="button" class="calc-btn btn-num">9</button>
            <button type="button" class="calc-btn btn-op" data-op="/">/</button>

            <button type="button" class="calc-btn btn-num">4</button>
            <button type="button" class="calc-btn btn-num">5</button>
            <button type="button" class="calc-btn btn-num">6</button>
            <button type="button" class="calc-btn btn-op" data-op="*">*</button>

            <button type="button" class="calc-btn btn-num">1</button>
            <button type="button" class="calc-btn btn-num">2</button>
            <button type="button" class="calc-btn btn-num">3</button>
            <button type="button" class="calc-btn btn-op" data-op="-">-</button>

            <button type="button" class="calc-btn btn-num">0</button>
            <button type="button" class="calc-btn btn-clear">C</button>
            <button type="button" class="calc-btn btn-equal">=</button>
            <button type="button" class="calc-btn btn-op" data-op="+">+</button>
        </div>
    </div>
    <script src="/script.js"></script>
</body>

</html>

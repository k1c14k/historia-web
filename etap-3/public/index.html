<!DOCTYPE html>
<html>

<head>
    <title>Historia Stron - Etap 3 (Refactor)</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="calculator">
        <table class="calc-table">
            <tr>
                <td colspan="4" align="center" class="calc-header">
                    <h2>KALKULATOR v3.0</h2>
                    <p>Etap 3: Tabele + CSS + JS (SPA)</p>
                </td>
            </tr>
            <tr>
                <td colspan="4">
                    <input type="text" id="display" value="0" readonly class="display-input">
                </td>
            </tr>
            <tr>
                <td><button type="button" class="calc-btn btn-num">7</button></td>
                <td><button type="button" class="calc-btn btn-num">8</button></td>
                <td><button type="button" class="calc-btn btn-num">9</button></td>
                <td><button type="button" class="calc-btn btn-op" data-op="/">/</button></td>
            </tr>
            <tr>
                <td><button type="button" class="calc-btn btn-num">4</button></td>
                <td><button type="button" class="calc-btn btn-num">5</button></td>
                <td><button type="button" class="calc-btn btn-num">6</button></td>
                <td><button type="button" class="calc-btn btn-op" data-op="*">*</button></td>
            </tr>
            <tr>
                <td><button type="button" class="calc-btn btn-num">1</button></td>
                <td><button type="button" class="calc-btn btn-num">2</button></td>
                <td><button type="button" class="calc-btn btn-num">3</button></td>
                <td><button type="button" class="calc-btn btn-op" data-op="-">-</button></td>
            </tr>
            <tr>
                <td><button type="button" class="calc-btn btn-num">0</button></td>
                <td><button type="button" class="calc-btn btn-clear">C</button></td>
                <td><button type="button" class="calc-btn btn-equal">=</button></td>
                <td><button type="button" class="calc-btn btn-op" data-op="+">+</button></td>
            </tr>
        </table>
    </div>
    <script src="/script.js"></script>
</body>

</html>
